# integrations-api building identity — BeaconV3
#
# Validated against the current canonical schema in
# loa-freeside/packages/beacon-schema/src/beacon-v3.ts on 2026-07-15.
# The checked-in JSON projection lives at /.well-known/beacon.json.
#
# This beacon describes the building that this repository is becoming. The
# GitHub repository rename and the loa-freeside registry change are separate,
# cross-repository ratification steps; this branch does not claim either landed.

schema_version: "3"
slug: "integrations-api"
publisher: "0xHoneyJar"

is:
  one_liner: "Evidence-backed provider ingress that normalizes external events into bounded Freeside observations"
  scope:
    - "Normalize versioned provider events into privacy-bounded Freeside observations"
    - "Disposition events as projected, ignored, quarantined, duplicate, or conflict"
    - "Publish source, coverage, and evidence artifacts for each provider contract"
    - "Expose provider-keyed adapters behind one typed ingestion boundary"
    - "Preserve medium-registry as a separate presentation compatibility surface"

is_not:
  - "Does NOT claim production durability until a transactional IngestionStore passes conformance"
  - "Does NOT own provider credentials, Gateway sessions, webhooks, or transport lifecycle"
  - "Does NOT resolve identity or write activity, score, inventory, or storage state"
  - "Will NOT silently discard unknown, malformed, duplicate, or conflicting events"
  - "Refuses to fold presentation rendering contracts into provider-ingestion contracts"

# No sibling runtime is called in wave 1. Downstream consumers are not declared
# as composes_with dependencies: this field is reserved for a concrete sibling
# Tag ABI (Name@semver+hash). Add one only when that typed port is ratified.
composes_with: {}

acvp_invariants:
  - id: event_completeness
    scope: "Every decoded event reaches a stored disposition or a surfaced typed/defect failure"
    proof_artifact: "packages/integrations-core/tests/ingest.test.ts"
    status: active
    runtime_class: envelope
  - id: idempotency
    scope: "Tenant-scoped event identity makes re-delivery duplicate and payload drift conflict"
    proof_artifact: "packages/integrations-core/tests/identity.test.ts"
    status: active
    runtime_class: envelope
  - id: state_machine_totality
    scope: "The Discord admitted surface and adapter dispositions stay classification-complete"
    proof_artifact: "packages/integrations-core/tests/coverage.test.ts"
    status: active
    runtime_class: construct-local
  - id: schema_enforcement
    scope: "Envelopes, observations, dispositions, results, sources, coverage, and evidence decode"
    proof_artifact: "packages/integrations-core/tests/schema.test.ts"
    status: active
    runtime_class: construct-local

# BeaconV3 seals canonical-JSON schemas. Wave 1 exports Effect Schemas but has
# not yet emitted canonical JSON-schema artifacts, so this is deliberately
# empty rather than carrying placeholder or source-byte hashes.
sealed_schemas: []

capabilities:
  - ingestUnknown
  - RawEventEnvelope
  - IngestionResult
  - IngestionStore
  - AdapterRegistry
  - DiscordAdapterRegistryLayer
  - MediumCapability
  - renderVerifyMessageToDiscord

cycle_state:
  status: candidate
  since: "2026-07-15"
  next_review: "2026-10-13"

# No mcp or cli block yet: wave 1 is a library-level, non-production reference
# vertical. Transport publication follows the durable-store and security gates.
